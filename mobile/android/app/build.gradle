apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

android {
    ndkVersion rootProject.ext.ndkVersion
    compileSdkVersion rootProject.ext.compileSdkVersion

    namespace "com.thecuratormobile"
    defaultConfig {
        applicationId "com.thecuratormobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug // Use debug key for now; user can add release key later
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '..'
    root = file("../../")
    //   The folder where the react-native package is. Default is ../node_modules/react-native
    reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native codegen package is. Default is ../node_modules/@react-native/codegen
    codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the entry point of react-native CLI. Default is ../node_modules/react-native/cli.js
    cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to autolink. Default is all.
    // autolinkVariants = ["debug", "release"]

    /* Bundling */
    //   Configures bundle flags, please refer to the parent block description for settings availables.
    // bundleFlags = "--smart-asset-discovery [true|false]"

    /* Hermess */
    //   The path to the Hermes binary. Default is the one coming from the npm package.
    // hermesCommand = "$projectDir/node_modules/react-native/sdks/hermesc/%OS-BIN%/hermesc"

    /* Autolinking */
}

// DEFINITIVE MUZZLE: Disable the failing autolinking tasks because we are using a manual bridge.
tasks.configureEach { task ->
    if (task.name.contains("generateAutolinkingPackageList") || task.name.contains("generateAutolinkingNewArchitecturePackageList")) {
        task.enabled = false
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation project(':llama.rn')
    implementation project(':react-native-fs')
    implementation project(':react-native-keychain')
}
