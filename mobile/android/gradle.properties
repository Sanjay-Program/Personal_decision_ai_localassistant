android.useAndroidX=true
android.enableJetifier=true
FLIPPER_VERSION=0.250.0
# Gradle performance and stability settings
# Suppressing the 'Restricted method' warnings that break JSON parsing in RNGP
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m --add-opens=java.base/java.lang=ALL-UNNAMED
org.gradle.parallel=true
org.gradle.daemon=true
# The Nothing Phone 1 has a Snapdragon chip; hardware optimization
ReactNative_NativeArchitectureInAnroid=true
org.gradle.java.home=/usr/lib/jvm/java-21-openjdk
